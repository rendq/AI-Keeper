# Minimal valid Skill fixture: every regex / enum / cross-field rule
# enforced by the AIP admission webhook (task 2.3) is satisfied. Used as
# a positive control alongside `invalid_skill.yaml` so developers can
# verify that the webhook only rejects what it should.
apiVersion: skill.ai-keeper.io/v1alpha1
kind: Skill
metadata:
  name: contract-review
  namespace: default
spec:
  version: 1.0.0
  stability: beta
  interface:
    input:
      schema:
        type: object
    output:
      schema:
        type: object
  implementation:
    type: function
    requires:
      tools:
        - ref: tool://docusign/create-envelope@v3
      models:
        - alias: reasoner
          ref: model://gpt-4o-eu@2024-05-13
  reliability:
    timeout: 30s
