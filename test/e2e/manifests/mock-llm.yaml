apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-llm
  namespace: aik-system
  labels:
    app: mock-llm
    app.kubernetes.io/part-of: aip
    app.kubernetes.io/component: mock-llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-llm
  template:
    metadata:
      labels:
        app: mock-llm
        app.kubernetes.io/part-of: aip
        app.kubernetes.io/component: mock-llm
    spec:
      containers:
        - name: mock-llm
          image: mock-llm:e2e
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mock-llm
  namespace: aik-system
  labels:
    app: mock-llm
    app.kubernetes.io/part-of: aip
spec:
  selector:
    app: mock-llm
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
