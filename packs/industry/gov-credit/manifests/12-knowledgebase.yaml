apiVersion: data.ai-keeper.io/v1alpha1
kind: KnowledgeBase
metadata:
  name: gov-policy-kb
  namespace: gov-credit-dept
spec:
  displayName: 政务政策法规知识库
  sources:
    - ref: data://gov-credit-dept/gov-docs-source
      sync:
        schedule: "0 */6 * * *"
  pipeline:
    chunking:
      strategy: semantic
      maxTokens: 512
      overlap: 64
    embedding:
      ref: model://bge-large-zh-v1.5
      dimensions: 1024
    enrichment:
      - pii_tagging
      - classification_inheritance
      - entity_extraction
      - policy_linking
      - credit_entity_tagging
  retrieval:
    topK: 15
    reranker:
      enabled: true
      model: ref://model/bge-reranker-v2-m3
  acl:
    mode: pre_filter
    enforcement: pre_filter
  classification: secret
  encryption:
    atRest: SM4-GCM
    vectorIndex: SM4-CBC
