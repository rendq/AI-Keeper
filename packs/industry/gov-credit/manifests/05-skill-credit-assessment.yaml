apiVersion: skill.ai-keeper.io/v1alpha1
kind: Skill
metadata:
  name: credit-assessment
  namespace: gov-credit-dept
spec:
  version: "1.0.0"
  stability: stable
  interface:
    input:
      schema:
        type: object
        required:
          - entityId
          - entityType
        properties:
          entityId:
            type: string
            description: 评估对象 ID（统一社会信用代码或身份证号脱敏值）
          entityType:
            type: string
            enum: [enterprise, individual]
            description: 评估对象类型（企业/个人）
          assessmentScope:
            type: array
            items:
              type: string
              enum: [financial, tax, legal, social, environmental]
            description: 评估维度
    output:
      schema:
        type: object
        required:
          - creditScore
          - riskLevel
          - dimensions
        properties:
          creditScore:
            type: number
            minimum: 0
            maximum: 1000
            description: 综合信用评分
          riskLevel:
            type: string
            enum: [low, medium, high, critical]
          dimensions:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
                score:
                  type: number
                findings:
                  type: array
                  items:
                    type: string
          recommendations:
            type: array
            items:
              type: string
  implementation:
    runtime: python
    image: registry.xinchuang.gov.cn/aip/skills/credit-assessment:1.0.0-kylin
    entrypoint: credit_assessment:assess
    requires:
      models:
        - alias: reasoner
          versionConstraint: ">=2024.01"
      dataSources:
        - ref: data://gov-credit-dept/gov-policy-kb
  governance:
    classification: secret
    pii:
      onInput: detect_and_mask
      onOutput: detect_and_mask
      patternsRef: ref://patterns/gov-credit-pii
  cost:
    budget: ref://budget/gov-credit-dept-monthly
  slo:
    p95LatencyMs: 12000
    successRate: 0.93
