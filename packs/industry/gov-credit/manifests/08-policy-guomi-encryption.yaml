apiVersion: policy.ai-keeper.io/v1alpha1
kind: Policy
metadata:
  name: guomi-encryption
  namespace: gov-credit-dept
spec:
  displayName: 国密加密策略
  description: |
    强制全链路使用国密算法：SM2（非对称加密/数字签名）、SM3（哈希）、SM4（对称加密）。
    禁止使用 RSA、AES、SHA 等国际算法，确保通过商用密码应用安全性评估。
  effect: deny
  priority: 3
  subject:
    match:
      - kind: ServiceAccount
        names:
          - "*"
      - kind: ModelEndpoint
        names:
          - "*"
      - kind: DataSource
        names:
          - "*"
  action:
    - invoke
    - query
    - export
    - store
    - transmit
  resource:
    match:
      - kind: Skill
        names:
          - "*"
      - kind: KnowledgeBase
        names:
          - "*"
      - kind: ModelEndpoint
        names:
          - "*"
  conditions:
    # 传输加密必须使用 SM4
    - expression: "request.transport.cipher.startsWith('SM4')"
      description: 数据传输必须使用 SM4 加密算法
    # TLS 必须使用国密套件
    - expression: "request.transport.tlsSuite in ['GMTLS', 'ECC_SM4_SM3', 'ECDHE_SM4_SM3']"
      description: TLS 必须使用国密密码套件
    # 签名验证必须使用 SM2
    - expression: "request.signature.algorithm == 'SM2'"
      description: 所有数字签名必须使用 SM2 算法
    # 存储加密必须使用 SM4
    - expression: "request.storage.encryption.algorithm == 'SM4'"
      description: 数据存储必须使用 SM4 加密
    # 哈希完整性校验必须使用 SM3
    - expression: "request.integrity.hash == 'SM3'"
      description: 数据完整性校验必须使用 SM3
  constraints:
    allowedCiphers:
      symmetric:
        - SM4-GCM
        - SM4-CBC
      asymmetric:
        - SM2
      hash:
        - SM3
    forbiddenCiphers:
      - RSA
      - AES
      - SHA-256
      - SHA-384
      - ECDSA
    requireHSM: true
    hsmType: gov-certified
  obligations:
    audit:
      level: full
      signatureAlgorithm: SM3
      retentionDays: 365
    encryption:
      atRest: SM4-GCM
      inTransit: SM4-GCM
      keyExchange: SM2
      hashIntegrity: SM3
      certificateAuthority: gov-ca
    notify:
      onViolation:
        - channel: gov-security-center
          template: guomi-violation-critical
        - channel: crypto-compliance-team
          template: guomi-violation-detail
