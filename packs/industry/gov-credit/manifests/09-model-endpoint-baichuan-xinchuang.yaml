apiVersion: model.ai-keeper.io/v1alpha1
kind: ModelEndpoint
metadata:
  name: baichuan-xinchuang
  namespace: gov-credit-dept
spec:
  displayName: 百川大模型（信创环境私有化部署）
  provider: baichuan
  model: Baichuan4-Gov
  endpoint: https://baichuan-xinchuang.internal:8443/v1
  region: cn-beijing
  secretRef: ref://secret/baichuan-xinchuang-key
  compliance:
    standards:
      - DJCP-L3
      - XINCHUANG
    dataResidency: cn-beijing
    privacy:
      dpaSigned: true
      dataRetention: none
    encryption:
      inTransit: SM4-GCM
      atRest: SM4-GCM
      keyExchange: SM2
  deployment:
    platform:
      os: kylin-v10
      arch: arm64
      cpu: kunpeng-920
    runtime: vllm
    accelerator: ascend-910b
    replicas: 2
  cost:
    input: 15.00
    output: 45.00
    cached: 8.00
    currency: CNY
    unit: per_million_tokens
  limits:
    tpm: 400000
    rpm: 2000
  fallback:
    - ref: model://gov-credit-dept/chatglm-xinchuang
  health:
    probeInterval: 30s
    timeout: 5s
