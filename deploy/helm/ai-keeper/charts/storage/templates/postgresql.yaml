{{- if .Values.postgresql.enabled }}
---
# PostgreSQL 16 — Skill / Tool / Prompt Registry backing store
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "storage.fullname" . }}-postgresql
  labels:
    {{- include "storage.postgresql.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_DB: {{ .Values.postgresql.database | b64enc | quote }}
  POSTGRES_USER: {{ .Values.postgresql.username | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.password | b64enc | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "storage.fullname" . }}-postgresql-initdb
  labels:
    {{- include "storage.postgresql.labels" . | nindent 4 }}
data:
  init-aip.sql: |
    -- AIP registry schema initialization
    CREATE SCHEMA IF NOT EXISTS aip;

    -- Skill Registry
    CREATE TABLE IF NOT EXISTS aip.skills (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      name TEXT NOT NULL,
      namespace TEXT NOT NULL,
      version TEXT NOT NULL,
      spec JSONB NOT NULL,
      created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
      updated_at TIMESTAMPTZ NOT NULL DEFAULT now(),
      UNIQUE(name, namespace, version)
    );

    -- Tool Registry
    CREATE TABLE IF NOT EXISTS aip.tools (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      name TEXT NOT NULL,
      namespace TEXT NOT NULL,
      protocol TEXT NOT NULL,
      spec JSONB NOT NULL,
      created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
      updated_at TIMESTAMPTZ NOT NULL DEFAULT now(),
      UNIQUE(name, namespace)
    );

    -- Prompt Registry
    CREATE TABLE IF NOT EXISTS aip.prompts (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      name TEXT NOT NULL,
      namespace TEXT NOT NULL,
      version TEXT NOT NULL,
      template TEXT NOT NULL,
      metadata JSONB,
      created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
      updated_at TIMESTAMPTZ NOT NULL DEFAULT now(),
      UNIQUE(name, namespace, version)
    );
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "storage.fullname" . }}-postgresql
  labels:
    {{- include "storage.postgresql.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postgresql.port }}
      targetPort: postgresql
      protocol: TCP
      name: postgresql
  selector:
    {{- include "storage.postgresql.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "storage.fullname" . }}-postgresql
  labels:
    {{- include "storage.postgresql.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "storage.fullname" . }}-postgresql
  replicas: {{ .Values.postgresql.replicas }}
  selector:
    matchLabels:
      {{- include "storage.postgresql.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "storage.postgresql.labels" . | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          ports:
            - name: postgresql
              containerPort: {{ .Values.postgresql.port }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "storage.fullname" . }}-postgresql
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgresql.username }}
                - -d
                - {{ .Values.postgresql.database }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgresql.username }}
                - -d
                - {{ .Values.postgresql.database }}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          volumeMounts:
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            {{- if .Values.postgresql.storage.enabled }}
            - name: data
              mountPath: /var/lib/postgresql/data
            {{- end }}
      volumes:
        - name: initdb
          configMap:
            name: {{ include "storage.fullname" . }}-postgresql-initdb
  {{- if .Values.postgresql.storage.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgresql.storage.storageClass }}
        storageClassName: {{ .Values.postgresql.storage.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgresql.storage.size }}
  {{- end }}
{{- end }}
