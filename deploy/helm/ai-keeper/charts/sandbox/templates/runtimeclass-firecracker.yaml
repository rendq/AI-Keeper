{{- if .Values.firecracker.enabled }}
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: firecracker
  labels:
    app.kubernetes.io/name: sandbox
    app.kubernetes.io/component: firecracker
    app.kubernetes.io/managed-by: {{ .Release.Service }}
handler: firecracker
{{- with .Values.firecracker.overhead }}
overhead:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- with .Values.firecracker.scheduling }}
scheduling:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
