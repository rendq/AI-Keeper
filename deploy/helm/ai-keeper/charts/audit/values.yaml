# Default values for the audit sub-chart.
# Real knobs (replicas, probes, envFrom, resources, ...) are added by
# the owning component task. Keep this file representative so
# `helm template` walks it cleanly.
---
# Toggle controlled by the parent chart (`audit.enabled` at top level).
enabled: false

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: aip/audit
  # Empty tag falls back to the umbrella chart's global.imageTag.
  tag: ""
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 8080

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
