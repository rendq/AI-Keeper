# AIP Phase 2 (P2) values overlay.
# Use with: helm install aip deploy/helm/ai-keeper -f deploy/helm/ai-keeper/values-p2.yaml
---

# ---------- Marketplace ----------
marketplace:
  enabled: true
  replicas: 2
  image:
    repository: aip/marketplace
    tag: ""
  service:
    type: ClusterIP
    port: 8090
  registry:
    # OCI registry for skill pack artifacts
    endpoint: "registry.aik-system.svc:5000"
    insecure: false
  review:
    # Auto-approve listings from verified publishers
    autoApprove: false
    requiredApprovals: 2
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

# ---------- Federation ----------
federation:
  enabled: false
  replicas: 2
  image:
    repository: aip/federation
    tag: ""
  mode: "mesh"  # mesh | hub-spoke
  cluster:
    name: ""
    region: ""
  peers: []
    # - name: cluster-east
    #   endpoint: https://fed.east.example.com:8443
    #   caSecretRef: cluster-east-ca
  sync:
    intervalSeconds: 30
    resources:
      - skillistings
      - policies
  tls:
    enabled: true
    certSecretRef: federation-tls
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ---------- Cedar Policy Engine ----------
cedar:
  enabled: false
  # When enabled, replaces OPA-based PDP with Cedar engine
  engine:
    image:
      repository: aip/cedar-engine
      tag: ""
    replicas: 2
  policyStore:
    # backend: configmap | s3 | git
    backend: configmap
    s3:
      bucket: ""
      prefix: "cedar-policies/"
    git:
      repo: ""
      branch: "main"
      path: "policies/"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ---------- Air-gapped Deployment ----------
airgap:
  enabled: false
  # Mirror registry for all container images
  mirrorRegistry: "registry.internal.example.com:5000"
  # Pre-loaded image list (generated by `aikctl airgap pack`)
  imageListConfigMap: aip-airgap-images
  # Offline helm repo
  helmRepo:
    type: chartmuseum  # chartmuseum | harbor
    url: "https://charts.internal.example.com"
  # Skip external connectivity checks
  skipConnectivityCheck: true
  # Local NTP server for cert validation
  ntpServer: "ntp.internal.example.com"

# ---------- Compliance Report Engine ----------
"compliance-report":
  enabled: true
  replicas: 1
  image:
    repository: aip/compliance-report
    tag: ""
  schedule:
    # Cron expression for periodic report generation
    cron: "0 2 * * 1"  # weekly Monday 2am
  profiles:
    - dengbao3
    - hipaa
  export:
    # formats: pdf | json | csv
    formats:
      - pdf
      - json
    storage:
      # Where to store generated reports
      type: s3  # s3 | pvc
      s3:
        bucket: "aip-compliance-reports"
        prefix: "reports/"
      pvc:
        claimName: ""
        subPath: "compliance/"
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
