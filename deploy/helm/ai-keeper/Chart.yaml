# AIP umbrella Helm chart — pulls in all sub-charts.
#
# Sub-charts are vendored locally under `charts/`; each is a no-op skeleton in
# task 1.3 and gets templates / images filled in by later tasks (16.1, 16.2,
# 9.1, 14.1, 14.2, 12.2, 11.1, ...). The dependency list is enumerated here so
# `helm dependency build` resolves them and so `helm template` walks every
# sub-chart even before they have manifests.
apiVersion: v2
name: aip
description: AI Platform (AIP) — declarative control plane + data plane Helm chart
type: application
version: 0.0.1
appVersion: "0.0.1"
kubeVersion: ">=1.28.0-0"
home: https://github.com/ai-keeper/ai-keeper
keywords:
  - aip
  - ai-platform
  - llm
  - mlops
maintainers:
  - name: The AIP Authors

dependencies:
  - name: manager
    version: 0.0.1
    repository: file://charts/manager
    condition: manager.enabled
  - name: gateway
    version: 0.0.1
    repository: file://charts/gateway
    condition: gateway.enabled
  - name: pdp
    version: 0.0.1
    repository: file://charts/pdp
    condition: pdp.enabled
  - name: pep
    version: 0.0.1
    repository: file://charts/pep
    condition: pep.enabled
  - name: audit
    version: 0.0.1
    repository: file://charts/audit
    condition: audit.enabled
  - name: router
    version: 0.0.1
    repository: file://charts/router
    condition: router.enabled
  - name: runtime
    version: 0.0.1
    repository: file://charts/runtime
    condition: runtime.enabled
  - name: channels
    version: 0.0.1
    repository: file://charts/channels
    condition: channels.enabled
  - name: storage
    version: 0.0.1
    repository: file://charts/storage
    condition: storage.enabled
  - name: audit-storage
    version: 0.1.0
    repository: file://charts/audit-storage
    condition: audit-storage.enabled
