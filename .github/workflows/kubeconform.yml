---
# Kubernetes manifest schema validation. Runs `make lint-k8s` (which
# kubeconforms config/crd/bases/*.yaml when they exist) plus an end-to-end
# helm template + kubeconform pass on the umbrella chart.
name: kubeconform

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "config/crd/**"
      - "deploy/helm/**"
      - "hack/kubeconform-precommit.sh"
      - ".github/workflows/kubeconform.yml"
      - "Makefile"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kubeconform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install uv (for yamllint via uv run)
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.18"

      - name: Sync uv dev deps (yamllint)
        run: uv sync --extra dev

      - name: Bootstrap k8s tooling (kubeconform + helm)
        run: make bootstrap-k8s

      - name: lint-k8s (CRDs + rendered helm chart)
        run: make lint-k8s

      - name: helm validate (helm lint + template + kubeconform)
        run: make helm-validate
