---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: tools.skill.ai-keeper.io
spec:
  group: skill.ai-keeper.io
  names:
    categories:
    - aip
    kind: Tool
    listKind: ToolList
    plural: tools
    shortNames:
    - tl
    singular: tool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.protocol
      name: Protocol
      type: string
    - jsonPath: .status.reachable
      name: Reachable
      type: boolean
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Tool is an atomic, schema-described capability invoked by Skills.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ToolSpec describes the desired state of a Tool.
            properties:
              authentication:
                description: Authentication block.
                properties:
                  mode:
                    description: Mode of authentication.
                    enum:
                    - none
                    - api_key
                    - oauth2_client_credentials
                    - oauth2_obo
                    - mtls
                    - spiffe
                    type: string
                  secretRef:
                    description: SecretRef holds the credential.
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - name
                    type: object
                  tokenExchangeRef:
                    description: TokenExchangeRef is required when Mode=oauth2_obo.
                    maxLength: 253
                    type: string
                required:
                - mode
                type: object
              cost:
                description: Cost block.
                properties:
                  perCallUsd:
                    description: |-
                      MoneyAmount is the canonical wire representation of a USD amount used
                      in CostBlock fields. We store money as a string with a constrained
                      pattern (rather than `float64`) to keep CRD diffs bit-for-bit
                      reproducible and to avoid the JSON-number rounding that breaks audit
                      hashing (Requirements F4, F22).
                    maxLength: 32
                    pattern: ^\d+(\.\d+)?$
                    type: string
                type: object
              endpoint:
                description: Endpoint URL of the tool.
                maxLength: 2048
                minLength: 3
                type: string
              governance:
                description: Governance + side-effects + approval.
                properties:
                  classification:
                    description: Classification applied to data flowing through the
                      resource.
                    enum:
                    - public
                    - internal
                    - confidential
                    - restricted
                    - secret
                    type: string
                  compliance:
                    description: Compliance regimes required for this resource.
                    properties:
                      reportTemplate:
                        description: ReportTemplate references a compliance reporting
                          template.
                        maxLength: 512
                        minLength: 8
                        pattern: ^(skill|agent|tool|model|data|prompt|channel|connector|memory|quota|ref|siem|policy)://[A-Za-z0-9._/\-]+(@[A-Za-z0-9._\-+]+)?$
                        type: string
                      required:
                        description: Required compliance tags (e.g. "GDPR", "HIPAA",
                          "等保三级").
                        items:
                          type: string
                        type: array
                    type: object
                  dataResidency:
                    description: DataResidency controls geographic placement of processing.
                    properties:
                      allowedRegions:
                        description: |-
                          AllowedRegions lists the regions in which a request may be
                          processed (e.g. "cn-north", "eu-west").
                        items:
                          type: string
                        type: array
                      crossBorder:
                        description: |-
                          CrossBorder controls whether transfers across the residency
                          boundary are permitted.
                        enum:
                        - forbidden
                        - allowed_with_approval
                        - allowed
                        type: string
                    type: object
                  holds:
                    description: |-
                      Holds carries legal-hold tags. Audit events inheriting these tags
                      are exempt from automatic deletion until the holds are cleared.
                    items:
                      type: string
                    type: array
                  pii:
                    description: PII policy.
                    properties:
                      onInput:
                        description: OnInput controls inbound DLP behaviour.
                        enum:
                        - ignore
                        - detect
                        - detect_and_mask
                        - detect_and_block
                        type: string
                      onOutput:
                        description: OnOutput controls outbound DLP behaviour.
                        enum:
                        - ignore
                        - detect
                        - detect_and_mask
                        - detect_and_block
                        type: string
                      patternsRef:
                        description: |-
                          PatternsRef points at a `ref://patterns/<name>` resource that holds
                          the regex / dictionary patterns the DLP engine uses.
                        maxLength: 512
                        minLength: 8
                        pattern: ^(skill|agent|tool|model|data|prompt|channel|connector|memory|quota|ref|siem|policy)://[A-Za-z0-9._/\-]+(@[A-Za-z0-9._\-+]+)?$
                        type: string
                    type: object
                  requiresApproval:
                    description: |-
                      RequiresApproval forces HITL on every invocation. Required when
                      SideEffects=destructive (Requirement A9.2 lint rule
                      `tool/destructive-needs-approval`).
                    type: boolean
                  retentionDays:
                    description: |-
                      RetentionDays is how many days raw payloads may be retained
                      (audit-related; mirrors `retention` Duration on Skill governance
                      but is expressed in days for budget UIs).
                    format: int32
                    maximum: 36500
                    minimum: 0
                    type: integer
                  sideEffects:
                    description: SideEffects classifies the tool's blast radius.
                    enum:
                    - read_only
                    - write
                    - destructive
                    - external
                    type: string
                type: object
              protocol:
                description: Protocol the tool speaks.
                enum:
                - mcp
                - openapi
                - grpc
                - builtin
                - http
                type: string
              rateLimit:
                description: RateLimit caps.
                properties:
                  burst:
                    format: int32
                    minimum: 0
                    type: integer
                  perAgentPerMinute:
                    format: int32
                    minimum: 0
                    type: integer
                  perTenantPerMinute:
                    format: int32
                    minimum: 0
                    type: integer
                type: object
              reliability:
                description: Reliability block.
                properties:
                  circuitBreaker:
                    description: CircuitBreaker policy.
                    properties:
                      enabled:
                        description: Enabled flips the breaker on/off without removing
                          config.
                        type: boolean
                      errorRateThreshold:
                        maximum: 1
                        minimum: 0
                        type: number
                      window:
                        description: |-
                          Duration is a coarse-grained, human-friendly duration string used in
                          CRDs. Supported units: ns, us, ms, s, m, h, d, w.

                          Validates: Requirements A2.2.
                        maxLength: 32
                        minLength: 2
                        pattern: ^\d+(ns|us|ms|s|m|h|d|w)$
                        type: string
                    type: object
                  fallback:
                    description: Fallback chain — multiple entries form an ordered
                      list.
                    items:
                      description: |-
                        FallbackSpec describes the fallback chain triggered when the primary
                        resource fails.
                      properties:
                        kind:
                          enum:
                          - Skill
                          - Agent
                          - StaticResponse
                          type: string
                        ref:
                          description: |-
                            ResourceRef is the canonical AIP URI used to reference any other resource
                            (skills, tools, models, data, prompts, channels, connectors, memory,
                            quota, ref, siem, policy). The accepted shape is
                            `<scheme>://<path>[@<version>]`.

                            Validates: Requirements A2.1 (regex enforcement), F25 (Parse∘Format
                            round-trip).
                          maxLength: 512
                          minLength: 8
                          pattern: ^(skill|agent|tool|model|data|prompt|channel|connector|memory|quota|ref|siem|policy)://[A-Za-z0-9._/\-]+(@[A-Za-z0-9._\-+]+)?$
                          type: string
                        staticResponse:
                          type: string
                      type: object
                    type: array
                  retries:
                    description: Retries policy.
                    properties:
                      backoff:
                        enum:
                        - fixed
                        - linear
                        - exponential
                        type: string
                      max:
                        description: Maximum number of retries.
                        format: int32
                        maximum: 10
                        minimum: 0
                        type: integer
                      retryOn:
                        description: RetryOn lists the failure classes that should
                          be retried.
                        items:
                          type: string
                        type: array
                        x-kubernetes-list-type: set
                    type: object
                  timeout:
                    description: Timeout for a single invocation.
                    maxLength: 32
                    minLength: 2
                    pattern: ^\d+(ns|us|ms|s|m|h|d|w)$
                    type: string
                type: object
              schema:
                description: Schema for input/output.
                properties:
                  input:
                    x-kubernetes-preserve-unknown-fields: true
                  output:
                    x-kubernetes-preserve-unknown-fields: true
                required:
                - input
                - output
                type: object
            required:
            - endpoint
            - governance
            - protocol
            - schema
            type: object
          status:
            description: ToolStatus describes the observed state of a Tool.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              errorRate24h:
                description: ErrorRate24h reported as a fraction in [0, 1].
                type: number
              invocations24h:
                description: Invocations24h rolling counter.
                format: int64
                type: integer
              lastProbeAt:
                description: LastProbeAt is when the controller last probed `endpoint`.
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: |-
                  Phase is the coarse-grained status.phase value reported by every AIP
                  controller. The combined enum covers every controller in the platform
                  (Skill / Agent / Policy / Tool / DataSource / KB / ModelEndpoint /
                  ModelRouter / Tenant / SA / Budget / Quota), so a single Phase type can
                  be embedded in any status struct.

                  Validates: Requirements A3, A4, A5 (state machines reference these
                  values).
                enum:
                - Pending
                - Validating
                - Resolving
                - Building
                - Registering
                - Evaluating
                - Active
                - Degraded
                - Failed
                - Deprecated
                - Terminating
                - Suspended
                - Expired
                - ResolvingSkills
                - AttachingPolicies
                - Provisioning
                - Deploying
                - Configuring
                - RollingOut
                - Running
                - Paused
                - RolledBack
                type: string
              reachable:
                description: Reachable is True when the periodic probe last succeeded.
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
