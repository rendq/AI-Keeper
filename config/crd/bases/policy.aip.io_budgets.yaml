---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: budgets.policy.ai-keeper.io
spec:
  group: policy.ai-keeper.io
  names:
    categories:
    - aip
    kind: Budget
    listKind: BudgetList
    plural: budgets
    shortNames:
    - bg
    singular: budget
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.scope.kind
      name: Scope
      type: string
    - jsonPath: .spec.period
      name: Period
      type: string
    - jsonPath: .status.current.usd
      name: Used
      type: string
    - jsonPath: .spec.limits.usd
      name: Limit
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Budget caps spend on a (kind, name) scope per period.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BudgetSpec is the desired state of a Budget.
            properties:
              alerts:
                items:
                  description: BudgetAlert is one threshold-trigger.
                  properties:
                    action:
                      description: Action when the threshold trips.
                      enum:
                      - notify
                      - throttle
                      - block
                      type: string
                    channels:
                      description: Channels are notification destinations.
                      items:
                        type: string
                      minItems: 1
                      type: array
                    threshold:
                      description: Threshold is a percentage like "80%".
                      pattern: ^\d{1,3}%$
                      type: string
                  required:
                  - channels
                  - threshold
                  type: object
                type: array
              hardCap:
                description: HardCap defaults to true. When set, calls are blocked
                  at 100%.
                type: boolean
              limits:
                description: BudgetLimits is the per-period cap.
                properties:
                  calls:
                    format: int64
                    minimum: 0
                    type: integer
                  tokens:
                    format: int64
                    minimum: 0
                    type: integer
                  usd:
                    description: |-
                      MoneyAmount is the canonical wire representation of a USD amount used
                      in CostBlock fields. We store money as a string with a constrained
                      pattern (rather than `float64`) to keep CRD diffs bit-for-bit
                      reproducible and to avoid the JSON-number rounding that breaks audit
                      hashing (Requirements F4, F22).
                    maxLength: 32
                    pattern: ^\d+(\.\d+)?$
                    type: string
                type: object
              period:
                enum:
                - hourly
                - daily
                - weekly
                - monthly
                - quarterly
                - yearly
                type: string
              rollover:
                type: boolean
              scope:
                description: BudgetScope identifies which dimension a budget applies
                  to.
                properties:
                  kind:
                    enum:
                    - Tenant
                    - Team
                    - User
                    - Agent
                    - Skill
                    - Project
                    type: string
                  name:
                    maxLength: 253
                    minLength: 1
                    type: string
                required:
                - kind
                - name
                type: object
            required:
            - limits
            - period
            - scope
            type: object
          status:
            description: BudgetStatus is the observed state.
            properties:
              burnRate:
                description: BurnRate is one of {ok, warning, critical, exhausted}.
                enum:
                - ok
                - warning
                - critical
                - exhausted
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              current:
                description: BudgetCurrent is the running spend.
                properties:
                  calls:
                    format: int64
                    type: integer
                  tokens:
                    format: int64
                    type: integer
                  usd:
                    description: |-
                      MoneyAmount is the canonical wire representation of a USD amount used
                      in CostBlock fields. We store money as a string with a constrained
                      pattern (rather than `float64`) to keep CRD diffs bit-for-bit
                      reproducible and to avoid the JSON-number rounding that breaks audit
                      hashing (Requirements F4, F22).
                    maxLength: 32
                    pattern: ^\d+(\.\d+)?$
                    type: string
                type: object
              daysRemaining:
                format: int32
                type: integer
              observedGeneration:
                format: int64
                type: integer
              periodEnd:
                format: date-time
                type: string
              periodStart:
                format: date-time
                type: string
              phase:
                description: |-
                  Phase is the coarse-grained status.phase value reported by every AIP
                  controller. The combined enum covers every controller in the platform
                  (Skill / Agent / Policy / Tool / DataSource / KB / ModelEndpoint /
                  ModelRouter / Tenant / SA / Budget / Quota), so a single Phase type can
                  be embedded in any status struct.

                  Validates: Requirements A3, A4, A5 (state machines reference these
                  values).
                enum:
                - Pending
                - Validating
                - Resolving
                - Building
                - Registering
                - Evaluating
                - Active
                - Degraded
                - Failed
                - Deprecated
                - Terminating
                - Suspended
                - Expired
                - ResolvingSkills
                - AttachingPolicies
                - Provisioning
                - Deploying
                - Configuring
                - RollingOut
                - Running
                - Paused
                - RolledBack
                type: string
              projectedExhaustionAt:
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
