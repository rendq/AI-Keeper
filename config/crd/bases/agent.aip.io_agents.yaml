                  currentStep:
                    format: int32
                    type: integer
                  phase:
                    enum:
                    - Progressing
                    - Promoting
                    - Paused
                    - Aborted
                    - Succeeded
                    type: string
                  trafficWeight:
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                type: object
            type: object
