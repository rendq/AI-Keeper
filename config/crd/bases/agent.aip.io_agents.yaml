                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              effectivePolicies:
                description: EffectivePolicies attached at the PDP.
                items:
                  type: string
                type: array
              metrics:
                description: AgentMetrics surfaces user / cost / latency rollups.
                properties:
                  activeUsers:
                    format: int32
                    type: integer
                  today:
                    description: AgentTodayMetrics is the rolling 24h metric snapshot.
                    properties:
                      costUsd:
                        description: |-
                          MoneyAmount is the canonical wire representation of a USD amount used
                          in CostBlock fields. We store money as a string with a constrained
                          pattern (rather than `float64`) to keep CRD diffs bit-for-bit
                          reproducible and to avoid the JSON-number rounding that breaks audit
                          hashing (Requirements F4, F22).
                        maxLength: 32
                        pattern: ^\d+(\.\d+)?$
                        type: string
                      errorRate:
                        type: number
                      invocations:
                        format: int64
                        type: integer
                      p95LatencyMs:
                        format: int32
                        type: integer
                    type: object
                type: object
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: |-
                  Phase is the coarse-grained status.phase value reported by every AIP
                  controller. The combined enum covers every controller in the platform
                  (Skill / Agent / Policy / Tool / DataSource / KB / ModelEndpoint /
                  ModelRouter / Tenant / SA / Budget / Quota), so a single Phase type can
                  be embedded in any status struct.

                  Validates: Requirements A3, A4, A5 (state machines reference these
                  values).
                enum:
                - Pending
                - Validating
                - Resolving
                - Building
                - Registering
                - Evaluating
                - Active
                - Degraded
                - Failed
                - Deprecated
                - Terminating
                - Suspended
                - Expired
                - ResolvingSkills
                - AttachingPolicies
                - Provisioning
                - Deploying
                - Configuring
                - RollingOut
                - Running
                - Paused
                - RolledBack
                type: string
              readyReplicas:
                description: ReadyReplicas reported by the underlying Deployment.
