---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: tenants.core.ai-keeper.io
spec:
  group: core.ai-keeper.io
  names:
    categories:
    - aip
    kind: Tenant
    listKind: TenantList
    plural: tenants
    shortNames:
    - tn
    singular: tenant
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.complianceProfile.tier
      name: Tier
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Tenant is the cluster-scoped isolation unit and compliance domain.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TenantSpec describes the desired state of a Tenant.
            properties:
              complianceProfile:
                description: ComplianceProfile drives audit / encryption / backup
                  defaults.
                properties:
                  certifications:
                    description: Certifications already obtained.
                    items:
                      type: string
                    type: array
                  dataResidency:
                    description: DataResidency for this tenant.
                    properties:
                      allowedRegions:
                        description: AllowedRegions where data may flow.
                        items:
                          type: string
                        type: array
                      forbidCrossBorder:
                        description: ForbidCrossBorder defaults to true.
                        type: boolean
                      primaryRegion:
                        description: PrimaryRegion the tenant data is processed in.
                        type: string
                    type: object
                  tier:
                    description: Tier maps to platform-wide compliance defaults.
                    enum:
                    - basic
                    - standard
                    - regulated
                    - classified
                    type: string
                required:
                - tier
                type: object
              contacts:
                description: Contacts for the tenant.
                items:
                  description: TenantContact identifies a human contact for the tenant.
                  properties:
                    email:
                      description: Email of the contact.
                      maxLength: 320
                      minLength: 3
                      type: string
                    role:
                      description: Role of the contact.
                      enum:
                      - admin
                      - security
                      - billing
                      - dpo
                      type: string
                  required:
                  - email
                  - role
                  type: object
                type: array
              defaultBudget:
                description: DefaultBudget seeded into the tenant namespace.
                properties:
                  tokensPerMonth:
                    format: int64
                    minimum: 0
                    type: integer
                  usdPerMonth:
                    description: |-
                      MoneyAmount is the canonical wire representation of a USD amount used
                      in CostBlock fields. We store money as a string with a constrained
                      pattern (rather than `float64`) to keep CRD diffs bit-for-bit
                      reproducible and to avoid the JSON-number rounding that breaks audit
                      hashing (Requirements F4, F22).
                    maxLength: 32
                    pattern: ^\d+(\.\d+)?$
                    type: string
                type: object
              deployment:
                description: Deployment posture.
                properties:
                  controlPlane:
                    enum:
                    - hosted
                    - self_managed
                    type: string
                  dataPlane:
                    enum:
                    - hosted
                    - customer_vpc
                    - on_premise
                    type: string
                  mode:
                    enum:
                    - saas_shared
                    - saas_dedicated
                    - vpc
                    - on_premise
                    - airgapped
                    type: string
                type: object
              description:
                description: Description is a free-form long form description.
                maxLength: 2000
                type: string
              displayName:
                description: DisplayName for UI / reporting.
                maxLength: 200
                minLength: 1
                type: string
              modelAllowlist:
                description: |-
                  ModelAllowlist restricts which ModelEndpoints calls in this tenant
                  may route to. Empty means no restriction.
                items:
                  description: |-
                    ResourceRef is the canonical AIP URI used to reference any other resource
                    (skills, tools, models, data, prompts, channels, connectors, memory,
                    quota, ref, siem, policy). The accepted shape is
                    `<scheme>://<path>[@<version>]`.

                    Validates: Requirements A2.1 (regex enforcement), F25 (Parse∘Format
                    round-trip).
                  maxLength: 512
                  minLength: 8
                  pattern: ^(skill|agent|tool|model|data|prompt|channel|connector|memory|quota|ref|siem|policy)://[A-Za-z0-9._/\-]+(@[A-Za-z0-9._\-+]+)?$
                  type: string
                type: array
            required:
            - complianceProfile
            - displayName
            type: object
          status:
            description: TenantStatus is the observed state of a Tenant.
            properties:
              certificationsObtained:
                description: |-
                  CertificationsObtained is the controller's view of compliance
                  attestations.
                items:
                  description: TenantCertification captures an obtained certification.
                  properties:
                    expiresAt:
                      format: date-time
                      type: string
                    name:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              conditions:
                description: Conditions track transitions of the controller state
                  machine.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              namespaces:
                description: Namespaces the controller has provisioned for this tenant.
                items:
                  type: string
                type: array
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
              phase:
                description: Phase is the coarse-grained lifecycle phase.
                enum:
                - Pending
                - Validating
                - Resolving
                - Building
                - Registering
                - Evaluating
                - Active
                - Degraded
                - Failed
                - Deprecated
                - Terminating
                - Suspended
                - Expired
                - ResolvingSkills
                - AttachingPolicies
                - Provisioning
                - Deploying
                - Configuring
                - RollingOut
                - Running
                - Paused
                - RolledBack
                type: string
              usage:
                description: Usage roll-up.
                properties:
                  activeAgents:
                    format: int32
                    type: integer
                  activeSkills:
                    format: int32
                    type: integer
                  last30dCostUsd:
                    description: |-
                      MoneyAmount is the canonical wire representation of a USD amount used
                      in CostBlock fields. We store money as a string with a constrained
                      pattern (rather than `float64`) to keep CRD diffs bit-for-bit
                      reproducible and to avoid the JSON-number rounding that breaks audit
                      hashing (Requirements F4, F22).
                    maxLength: 32
                    pattern: ^\d+(\.\d+)?$
                    type: string
                  last30dInvocations:
                    format: int64
                    type: integer
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
