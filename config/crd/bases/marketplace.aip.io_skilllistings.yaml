---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: skilllistings.marketplace.ai-keeper.io
spec:
  group: marketplace.ai-keeper.io
  names:
    categories:
    - aip
    kind: SkillListing
    listKind: SkillListingList
    plural: skilllistings
    shortNames:
    - sl
    singular: skilllisting
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.category
      name: Category
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.downloads
      name: Downloads
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SkillListing represents a skill published to the AIP marketplace.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SkillListingSpec describes the desired state of a SkillListing.
            properties:
              category:
                description: Category classifies the listing for marketplace browsing.
                maxLength: 100
                minLength: 1
                type: string
              pricing:
                description: Pricing defines the pricing model for this listing.
                properties:
                  amount:
                    description: |-
                      Amount is the price in USD (e.g. "0.01" per call, "29.99" per month).
                      Only required when Model is not "free".
                    maxLength: 32
                    pattern: ^\d+(\.\d+)?$
                    type: string
                  model:
                    description: Model is the pricing strategy.
                    enum:
                    - free
                    - per_call
                    - per_month
                    - per_token
                    type: string
                required:
                - model
                type: object
              publisher:
                description: Publisher identifies who is publishing this skill.
                properties:
                  email:
                    description: Email contact for the publisher.
                    maxLength: 320
                    minLength: 3
                    type: string
                  name:
                    description: Name of the publisher.
                    maxLength: 200
                    minLength: 1
                    type: string
                  url:
                    description: URL of the publisher's website or profile.
                    type: string
                required:
                - name
                type: object
              readme:
                description: Readme is the long-form description (Markdown).
                maxLength: 65536
                type: string
              screenshots:
                description: Screenshots for the listing detail page.
                items:
                  description: Screenshot holds a reference to a screenshot image
                    for the listing.
                  properties:
                    caption:
                      description: Caption describes the screenshot.
                      type: string
                    url:
                      description: URL of the screenshot image.
                      maxLength: 2048
                      minLength: 1
                      type: string
                  required:
                  - url
                  type: object
                maxItems: 10
                type: array
              skillRef:
                description: SkillRef references the underlying Skill being listed.
                maxLength: 512
                minLength: 8
                pattern: ^(skill|agent|tool|model|data|prompt|channel|connector|memory|quota|ref|siem|policy)://[A-Za-z0-9._/\-]+(@[A-Za-z0-9._\-+]+)?$
                type: string
              tags:
                description: Tags for search and filtering.
                items:
                  type: string
                maxItems: 20
                type: array
                x-kubernetes-list-type: set
            required:
            - category
            - pricing
            - publisher
            - skillRef
            type: object
          status:
            description: SkillListingStatus is the observed state of a SkillListing.
            properties:
              averageRating:
                description: AverageRating is the mean star rating (1.0–5.0).
                type: string
              conditions:
                description: Conditions track transitions of the controller state
                  machine.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              downloads:
                description: Downloads is the total number of installs/downloads.
                format: int64
                minimum: 0
                type: integer
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
              phase:
                description: Phase is the marketplace lifecycle phase.
                enum:
                - Draft
                - PendingReview
                - Published
                - Rejected
                - Suspended
                - Archived
                type: string
              revenue:
                description: Revenue is the total revenue generated in USD.
                maxLength: 32
                pattern: ^\d+(\.\d+)?$
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
