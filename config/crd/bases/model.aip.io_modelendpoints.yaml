---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: modelendpoints.model.ai-keeper.io
spec:
  group: model.ai-keeper.io
  names:
    categories:
    - aip
    kind: ModelEndpoint
    listKind: ModelEndpointList
    plural: modelendpoints
    shortNames:
    - me
    singular: modelendpoint
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.provider
      name: Provider
      type: string
    - jsonPath: .spec.region
      name: Region
      type: string
    - jsonPath: .spec.model
      name: Model
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ModelEndpoint is a concrete model instance reachable by the platform.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ModelEndpointSpec is the desired state.
            properties:
              authentication:
                description: ModelEndpointAuthentication captures auth.
                properties:
                  mode:
                    enum:
                    - api_key
                    - oauth2
                    - iam
                    - mtls
                    - none
                    type: string
                  secretRef:
                    description: ModelEndpointSecretRef holds credential pointer.
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - name
                    type: object
                required:
                - mode
                type: object
              capabilities:
                description: Capabilities the endpoint supports.
                items:
                  type: string
                type: array
                x-kubernetes-list-type: set
              compliance:
                description: Compliance regimes the endpoint is approved for.
                items:
                  type: string
                type: array
              contextWindow:
                format: int32
                minimum: 0
                type: integer
              cost:
                description: ModelEndpointCost captures pricing.
                properties:
                  cachedInputUsdPerMTok:
                    description: |-
                      MoneyAmount is the canonical wire representation of a USD amount used
                      in CostBlock fields. We store money as a string with a constrained
                      pattern (rather than `float64`) to keep CRD diffs bit-for-bit
                      reproducible and to avoid the JSON-number rounding that breaks audit
                      hashing (Requirements F4, F22).
                    maxLength: 32
                    pattern: ^\d+(\.\d+)?$
                    type: string
                  embeddingUsdPerMTok:
                    description: |-
                      MoneyAmount is the canonical wire representation of a USD amount used
                      in CostBlock fields. We store money as a string with a constrained
                      pattern (rather than `float64`) to keep CRD diffs bit-for-bit
                      reproducible and to avoid the JSON-number rounding that breaks audit
                      hashing (Requirements F4, F22).
                    maxLength: 32
                    pattern: ^\d+(\.\d+)?$
                    type: string
                  inputUsdPerMTok:
                    description: |-
                      MoneyAmount is the canonical wire representation of a USD amount used
                      in CostBlock fields. We store money as a string with a constrained
                      pattern (rather than `float64`) to keep CRD diffs bit-for-bit
                      reproducible and to avoid the JSON-number rounding that breaks audit
                      hashing (Requirements F4, F22).
                    maxLength: 32
                    pattern: ^\d+(\.\d+)?$
                    type: string
                  outputUsdPerMTok:
                    description: |-
                      MoneyAmount is the canonical wire representation of a USD amount used
                      in CostBlock fields. We store money as a string with a constrained
                      pattern (rather than `float64`) to keep CRD diffs bit-for-bit
                      reproducible and to avoid the JSON-number rounding that breaks audit
                      hashing (Requirements F4, F22).
                    maxLength: 32
                    pattern: ^\d+(\.\d+)?$
                    type: string
                type: object
              dataResidency:
                description: ModelEndpointResidency captures residency.
                properties:
                  primaryRegion:
                    maxLength: 64
                    type: string
                  sovereign:
                    type: boolean
                type: object
              deployment:
                description: ModelEndpointDeployment captures the deployment mode.
                properties:
                  kserveRef:
                    maxLength: 253
                    type: string
                  mode:
                    enum:
                    - public_api
                    - private_api
                    - dedicated
                    - on_premise
                    - edge
                    type: string
                type: object
              endpoint:
                description: Endpoint URL.
                maxLength: 2048
                minLength: 3
                type: string
              fallback:
                description: Fallback chain.
                items:
                  description: |-
                    ResourceRef is the canonical AIP URI used to reference any other resource
                    (skills, tools, models, data, prompts, channels, connectors, memory,
                    quota, ref, siem, policy). The accepted shape is
                    `<scheme>://<path>[@<version>]`.

                    Validates: Requirements A2.1 (regex enforcement), F25 (Parse∘Format
                    round-trip).
                  maxLength: 512
                  minLength: 8
                  pattern: ^(skill|agent|tool|model|data|prompt|channel|connector|memory|quota|ref|siem|policy)://[A-Za-z0-9._/\-]+(@[A-Za-z0-9._\-+]+)?$
                  type: string
                type: array
              maxOutputTokens:
                format: int32
                minimum: 0
                type: integer
              model:
                description: Model is the provider-specific model name.
                maxLength: 253
                minLength: 1
                type: string
              privacy:
                description: ModelEndpointPrivacy captures privacy commitments.
                properties:
                  dpaSigned:
                    type: boolean
                  trainOnInputs:
                    type: boolean
                  zeroRetention:
                    type: boolean
                type: object
              provider:
                description: Provider name.
                enum:
                - openai
                - anthropic
                - azure_openai
                - bedrock
                - vertex
                - aliyun_dashscope
                - tencent_hunyuan
                - volcengine_ark
                - baichuan
                - moonshot
                - deepseek
                - zhipu
                - minimax
                - self_hosted
                - vllm
                - sglang
                - tgi
                - ollama
                - custom
                type: string
              quota:
                description: ModelEndpointQuota captures provider rate limits.
                properties:
                  rpm:
                    format: int64
                    minimum: 0
                    type: integer
                  tpd:
                    format: int64
                    minimum: 0
                    type: integer
                  tpm:
                    format: int64
                    minimum: 0
                    type: integer
                type: object
              region:
                maxLength: 64
                type: string
            required:
            - endpoint
            - model
            - provider
            type: object
          status:
            description: ModelEndpointStatus is the observed state.
            properties:
              avgLatencyMs:
                format: int32
                type: integer
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              currentRpm:
                format: int64
                type: integer
              currentTpm:
                format: int64
                type: integer
              errorRate24h:
                type: number
              healthy:
                type: boolean
              lastProbeAt:
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: |-
                  Phase is the coarse-grained status.phase value reported by every AIP
                  controller. The combined enum covers every controller in the platform
                  (Skill / Agent / Policy / Tool / DataSource / KB / ModelEndpoint /
                  ModelRouter / Tenant / SA / Budget / Quota), so a single Phase type can
                  be embedded in any status struct.

                  Validates: Requirements A3, A4, A5 (state machines reference these
                  values).
                enum:
                - Pending
                - Validating
                - Resolving
                - Building
                - Registering
                - Evaluating
                - Active
                - Degraded
                - Failed
                - Deprecated
                - Terminating
                - Suspended
                - Expired
                - ResolvingSkills
                - AttachingPolicies
                - Provisioning
                - Deploying
                - Configuring
                - RollingOut
                - Running
                - Paused
                - RolledBack
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
