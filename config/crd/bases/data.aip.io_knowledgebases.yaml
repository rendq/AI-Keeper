---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: knowledgebases.data.ai-keeper.io
spec:
  group: data.ai-keeper.io
  names:
    categories:
    - aip
    kind: KnowledgeBase
    listKind: KnowledgeBaseList
    plural: knowledgebases
    shortNames:
    - kb
    singular: knowledgebase
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.documentCount
      name: Documents
      type: integer
    - jsonPath: .status.chunkCount
      name: Chunks
      type: integer
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: KnowledgeBase is a retrieval-ready aggregation of DataSources.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: KnowledgeBaseSpec is the desired state.
            properties:
              acl:
                description: KBACL controls KB-level access enforcement.
                properties:
                  enforcement:
                    enum:
                    - pre_filter
                    - post_filter
                    type: string
                  mode:
                    enum:
                    - inherit_from_source
                    - custom
                    type: string
                type: object
              governance:
                description: KBGovernance is GovernanceBlock + retention.
                properties:
                  classification:
                    description: Classification applied to data flowing through the
                      resource.
                    enum:
                    - public
                    - internal
                    - confidential
                    - restricted
                    - secret
                    type: string
                  compliance:
                    description: Compliance regimes required for this resource.
                    properties:
                      reportTemplate:
                        description: ReportTemplate references a compliance reporting
                          template.
                        maxLength: 512
                        minLength: 8
                        pattern: ^(skill|agent|tool|model|data|prompt|channel|connector|memory|quota|ref|siem|policy)://[A-Za-z0-9._/\-]+(@[A-Za-z0-9._\-+]+)?$
                        type: string
                      required:
                        description: Required compliance tags (e.g. "GDPR", "HIPAA",
                          "等保三级").
                        items:
                          type: string
                        type: array
                    type: object
                  dataResidency:
                    description: DataResidency controls geographic placement of processing.
                    properties:
                      allowedRegions:
                        description: |-
                          AllowedRegions lists the regions in which a request may be
                          processed (e.g. "cn-north", "eu-west").
                        items:
                          type: string
                        type: array
                      crossBorder:
                        description: |-
                          CrossBorder controls whether transfers across the residency
                          boundary are permitted.
                        enum:
                        - forbidden
                        - allowed_with_approval
                        - allowed
                        type: string
                    type: object
                  holds:
                    description: |-
                      Holds carries legal-hold tags. Audit events inheriting these tags
                      are exempt from automatic deletion until the holds are cleared.
                    items:
                      type: string
                    type: array
                  pii:
                    description: PII policy.
                    properties:
                      onInput:
                        description: OnInput controls inbound DLP behaviour.
                        enum:
                        - ignore
                        - detect
                        - detect_and_mask
                        - detect_and_block
                        type: string
                      onOutput:
                        description: OnOutput controls outbound DLP behaviour.
                        enum:
                        - ignore
                        - detect
                        - detect_and_mask
                        - detect_and_block
                        type: string
                      patternsRef:
                        description: |-
                          PatternsRef points at a `ref://patterns/<name>` resource that holds
                          the regex / dictionary patterns the DLP engine uses.
                        maxLength: 512
                        minLength: 8
                        pattern: ^(skill|agent|tool|model|data|prompt|channel|connector|memory|quota|ref|siem|policy)://[A-Za-z0-9._/\-]+(@[A-Za-z0-9._\-+]+)?$
                        type: string
                    type: object
                  retention:
                    description: |-
                      Duration is a coarse-grained, human-friendly duration string used in
                      CRDs. Supported units: ns, us, ms, s, m, h, d, w.

                      Validates: Requirements A2.2.
                    maxLength: 32
                    minLength: 2
                    pattern: ^\d+(ns|us|ms|s|m|h|d|w)$
                    type: string
                  retentionDays:
                    description: |-
                      RetentionDays is how many days raw payloads may be retained
                      (audit-related; mirrors `retention` Duration on Skill governance
                      but is expressed in days for budget UIs).
                    format: int32
                    maximum: 36500
                    minimum: 0
                    type: integer
                type: object
              index:
                description: KBIndex captures the storage backends.
                properties:
                  fullTextStore:
                    description: |-
                      ResourceRef is the canonical AIP URI used to reference any other resource
                      (skills, tools, models, data, prompts, channels, connectors, memory,
                      quota, ref, siem, policy). The accepted shape is
                      `<scheme>://<path>[@<version>]`.

                      Validates: Requirements A2.1 (regex enforcement), F25 (Parse∘Format
                      round-trip).
                    maxLength: 512
                    minLength: 8
                    pattern: ^(skill|agent|tool|model|data|prompt|channel|connector|memory|quota|ref|siem|policy)://[A-Za-z0-9._/\-]+(@[A-Za-z0-9._\-+]+)?$
                    type: string
                  graphStore:
                    description: |-
                      ResourceRef is the canonical AIP URI used to reference any other resource
                      (skills, tools, models, data, prompts, channels, connectors, memory,
                      quota, ref, siem, policy). The accepted shape is
                      `<scheme>://<path>[@<version>]`.

                      Validates: Requirements A2.1 (regex enforcement), F25 (Parse∘Format
                      round-trip).
                    maxLength: 512
                    minLength: 8
                    pattern: ^(skill|agent|tool|model|data|prompt|channel|connector|memory|quota|ref|siem|policy)://[A-Za-z0-9._/\-]+(@[A-Za-z0-9._\-+]+)?$
                    type: string
                  hybridSearch:
                    type: boolean
                  multiTenant:
                    type: boolean
                  vectorStore:
                    description: |-
                      ResourceRef is the canonical AIP URI used to reference any other resource
                      (skills, tools, models, data, prompts, channels, connectors, memory,
                      quota, ref, siem, policy). The accepted shape is
                      `<scheme>://<path>[@<version>]`.

                      Validates: Requirements A2.1 (regex enforcement), F25 (Parse∘Format
                      round-trip).
                    maxLength: 512
                    minLength: 8
                    pattern: ^(skill|agent|tool|model|data|prompt|channel|connector|memory|quota|ref|siem|policy)://[A-Za-z0-9._/\-]+(@[A-Za-z0-9._\-+]+)?$
                    type: string
                required:
                - vectorStore
                type: object
              pipeline:
                description: KBPipeline config.
                properties:
                  chunking:
                    description: KBChunking config.
                    properties:
                      maxTokens:
                        format: int32
                        maximum: 8192
                        minimum: 64
                        type: integer
                      overlap:
                        format: int32
                        minimum: 0
                        type: integer
                      strategy:
                        enum:
                        - fixed
                        - semantic
                        - recursive
                        - structural
                        - hybrid
                        type: string
                    type: object
                  embedding:
                    description: KBEmbedding config.
                    properties:
                      dimensions:
                        format: int32
                        minimum: 1
                        type: integer
                      ref:
                        description: |-
                          ResourceRef is the canonical AIP URI used to reference any other resource
                          (skills, tools, models, data, prompts, channels, connectors, memory,
                          quota, ref, siem, policy). The accepted shape is
                          `<scheme>://<path>[@<version>]`.

                          Validates: Requirements A2.1 (regex enforcement), F25 (Parse∘Format
                          round-trip).
                        maxLength: 512
                        minLength: 8
                        pattern: ^(skill|agent|tool|model|data|prompt|channel|connector|memory|quota|ref|siem|policy)://[A-Za-z0-9._/\-]+(@[A-Za-z0-9._\-+]+)?$
                        type: string
                    type: object
                  enrichment:
                    description: |-
                      Enrichment passes (subset of allowed names; controllers tolerate
                      unknown values for forward compatibility).
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                type: object
              retrieval:
                description: KBRetrieval captures the retrieval block.
                properties:
                  filters:
                    description: Filters are CEL expressions over chunk metadata.
                    items:
                      type: string
                    type: array
                  reranker:
                    description: |-
                      ResourceRef is the canonical AIP URI used to reference any other resource
                      (skills, tools, models, data, prompts, channels, connectors, memory,
                      quota, ref, siem, policy). The accepted shape is
                      `<scheme>://<path>[@<version>]`.

                      Validates: Requirements A2.1 (regex enforcement), F25 (Parse∘Format
                      round-trip).
                    maxLength: 512
                    minLength: 8
                    pattern: ^(skill|agent|tool|model|data|prompt|channel|connector|memory|quota|ref|siem|policy)://[A-Za-z0-9._/\-]+(@[A-Za-z0-9._\-+]+)?$
                    type: string
                  topK:
                    format: int32
                    maximum: 100
                    minimum: 1
                    type: integer
                type: object
              sources:
                items:
                  description: KBSource is one DataSource binding.
                  properties:
                    ref:
                      description: |-
                        ResourceRef is the canonical AIP URI used to reference any other resource
                        (skills, tools, models, data, prompts, channels, connectors, memory,
                        quota, ref, siem, policy). The accepted shape is
                        `<scheme>://<path>[@<version>]`.

                        Validates: Requirements A2.1 (regex enforcement), F25 (Parse∘Format
                        round-trip).
                      maxLength: 512
                      minLength: 8
                      pattern: ^(skill|agent|tool|model|data|prompt|channel|connector|memory|quota|ref|siem|policy)://[A-Za-z0-9._/\-]+(@[A-Za-z0-9._\-+]+)?$
                      type: string
                    sync:
                      description: KBSourceSync controls per-source sync cadence.
                      properties:
                        mode:
                          enum:
                          - full
                          - incremental
                          - cdc
                          - manual
                          type: string
                        schedule:
                          maxLength: 128
                          type: string
                        watermarkField:
                          maxLength: 253
                          type: string
                      type: object
                  required:
                  - ref
                  type: object
                minItems: 1
                type: array
            required:
            - index
            - pipeline
            - sources
            type: object
          status:
            description: KnowledgeBaseStatus is the observed state.
            properties:
              chunkCount:
                format: int64
                type: integer
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              documentCount:
                format: int64
                type: integer
              indexSizeBytes:
                format: int64
                type: integer
              lastIndexedAt:
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: |-
                  Phase is the coarse-grained status.phase value reported by every AIP
                  controller. The combined enum covers every controller in the platform
                  (Skill / Agent / Policy / Tool / DataSource / KB / ModelEndpoint /
                  ModelRouter / Tenant / SA / Budget / Quota), so a single Phase type can
                  be embedded in any status struct.

                  Validates: Requirements A3, A4, A5 (state machines reference these
                  values).
                enum:
                - Pending
                - Validating
                - Resolving
                - Building
                - Registering
                - Evaluating
                - Active
                - Degraded
                - Failed
                - Deprecated
                - Terminating
                - Suspended
                - Expired
                - ResolvingSkills
                - AttachingPolicies
                - Provisioning
                - Deploying
                - Configuring
                - RollingOut
                - Running
                - Paused
                - RolledBack
                type: string
              qualityMetrics:
                description: KBQualityMetrics surfaces eval results from the retrieval
                  QA loop.
                properties:
                  avgMRR:
                    type: number
                  avgRecall:
                    type: number
                  lastEvalAt:
                    format: date-time
                    type: string
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
