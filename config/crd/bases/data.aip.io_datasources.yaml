---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: datasources.data.ai-keeper.io
spec:
  group: data.ai-keeper.io
  names:
    categories:
    - aip
    kind: DataSource
    listKind: DataSourceList
    plural: datasources
    shortNames:
    - ds
    singular: datasource
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.connector.kind
      name: Connector
      type: string
    - jsonPath: .status.connected
      name: Connected
      type: boolean
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: DataSource is a connector-backed source of truth.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DataSourceSpec is the desired state.
            properties:
              accessMode:
                description: AccessMode controls allowed verbs.
                enum:
                - read_only
                - read_write
                - write_only
                - stream
                type: string
              acl:
                description: DataSourceACL controls visibility.
                properties:
                  enforcement:
                    enum:
                    - pre_filter
                    - post_filter
                    - hybrid
                    type: string
                  mode:
                    enum:
                    - open
                    - inherit_from_source
                    - custom
                    - deny_all
                    type: string
                  policyRef:
                    description: |-
                      ResourceRef is the canonical AIP URI used to reference any other resource
                      (skills, tools, models, data, prompts, channels, connectors, memory,
                      quota, ref, siem, policy). The accepted shape is
                      `<scheme>://<path>[@<version>]`.

                      Validates: Requirements A2.1 (regex enforcement), F25 (Parse∘Format
                      round-trip).
                    maxLength: 512
                    minLength: 8
                    pattern: ^(skill|agent|tool|model|data|prompt|channel|connector|memory|quota|ref|siem|policy)://[A-Za-z0-9._/\-]+(@[A-Za-z0-9._\-+]+)?$
                    type: string
                type: object
              authentication:
                description: DataSourceAuthentication captures auth.
                properties:
                  mode:
                    enum:
                    - none
                    - api_key
                    - oauth2
                    - oauth2_obo
                    - basic
                    - mtls
                    - iam
                    type: string
                  secretRef:
                    description: DataSourceSecretRef points at the credential.
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - name
                    type: object
                required:
                - mode
                type: object
              connector:
                description: DataSourceConnector identifies how the connector is wired.
                properties:
                  config:
                    description: Config is connector-specific opaque config.
                    x-kubernetes-preserve-unknown-fields: true
                  kind:
                    description: Kind of connector.
                    enum:
                    - feishu_wiki
                    - feishu_doc
                    - wecom_doc
                    - confluence
                    - notion
                    - sharepoint
                    - jira
                    - gitlab
                    - github
                    - postgres
                    - mysql
                    - mongodb
                    - elasticsearch
                    - snowflake
                    - databricks
                    - s3
                    - oss
                    - kafka
                    - mcp_generic
                    - http_api
                    - custom
                    type: string
                  ref:
                    description: Ref to a `connector://` resource (e.g. shared connector
                      template).
                    maxLength: 512
                    minLength: 8
                    pattern: ^(skill|agent|tool|model|data|prompt|channel|connector|memory|quota|ref|siem|policy)://[A-Za-z0-9._/\-]+(@[A-Za-z0-9._\-+]+)?$
                    type: string
                required:
                - kind
                type: object
              governance:
                description: DataSourceGovernance extends GovernanceBlock with retention
                  policy.
                properties:
                  classification:
                    description: Classification applied to data flowing through the
                      resource.
                    enum:
                    - public
                    - internal
                    - confidential
                    - restricted
                    - secret
                    type: string
                  compliance:
                    description: Compliance regimes required for this resource.
                    properties:
                      reportTemplate:
                        description: ReportTemplate references a compliance reporting
                          template.
                        maxLength: 512
                        minLength: 8
                        pattern: ^(skill|agent|tool|model|data|prompt|channel|connector|memory|quota|ref|siem|policy)://[A-Za-z0-9._/\-]+(@[A-Za-z0-9._\-+]+)?$
                        type: string
                      required:
                        description: Required compliance tags (e.g. "GDPR", "HIPAA",
                          "等保三级").
                        items:
                          type: string
                        type: array
                    type: object
                  dataResidency:
                    description: DataResidency controls geographic placement of processing.
                    properties:
                      allowedRegions:
                        description: |-
                          AllowedRegions lists the regions in which a request may be
                          processed (e.g. "cn-north", "eu-west").
                        items:
                          type: string
                        type: array
                      crossBorder:
                        description: |-
                          CrossBorder controls whether transfers across the residency
                          boundary are permitted.
                        enum:
                        - forbidden
                        - allowed_with_approval
                        - allowed
                        type: string
                    type: object
                  deletionPolicy:
                    enum:
                    - soft
                    - hard
                    - never
                    type: string
                  holds:
                    description: |-
                      Holds carries legal-hold tags. Audit events inheriting these tags
                      are exempt from automatic deletion until the holds are cleared.
                    items:
                      type: string
                    type: array
                  pii:
                    description: PII policy.
                    properties:
                      onInput:
                        description: OnInput controls inbound DLP behaviour.
                        enum:
                        - ignore
                        - detect
                        - detect_and_mask
                        - detect_and_block
                        type: string
                      onOutput:
                        description: OnOutput controls outbound DLP behaviour.
                        enum:
                        - ignore
                        - detect
                        - detect_and_mask
                        - detect_and_block
                        type: string
                      patternsRef:
                        description: |-
                          PatternsRef points at a `ref://patterns/<name>` resource that holds
                          the regex / dictionary patterns the DLP engine uses.
                        maxLength: 512
                        minLength: 8
                        pattern: ^(skill|agent|tool|model|data|prompt|channel|connector|memory|quota|ref|siem|policy)://[A-Za-z0-9._/\-]+(@[A-Za-z0-9._\-+]+)?$
                        type: string
                    type: object
                  retention:
                    description: |-
                      Duration is a coarse-grained, human-friendly duration string used in
                      CRDs. Supported units: ns, us, ms, s, m, h, d, w.

                      Validates: Requirements A2.2.
                    maxLength: 32
                    minLength: 2
                    pattern: ^\d+(ns|us|ms|s|m|h|d|w)$
                    type: string
                  retentionDays:
                    description: |-
                      RetentionDays is how many days raw payloads may be retained
                      (audit-related; mirrors `retention` Duration on Skill governance
                      but is expressed in days for budget UIs).
                    format: int32
                    maximum: 36500
                    minimum: 0
                    type: integer
                type: object
            required:
            - connector
            type: object
          status:
            description: DataSourceStatus is the observed state.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              connected:
                type: boolean
              documentCount:
                format: int64
                type: integer
              lastSyncAt:
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: |-
                  Phase is the coarse-grained status.phase value reported by every AIP
                  controller. The combined enum covers every controller in the platform
                  (Skill / Agent / Policy / Tool / DataSource / KB / ModelEndpoint /
                  ModelRouter / Tenant / SA / Budget / Quota), so a single Phase type can
                  be embedded in any status struct.

                  Validates: Requirements A3, A4, A5 (state machines reference these
                  values).
                enum:
                - Pending
                - Validating
                - Resolving
                - Building
                - Registering
                - Evaluating
                - Active
                - Degraded
                - Failed
                - Deprecated
                - Terminating
                - Suspended
                - Expired
                - ResolvingSkills
                - AttachingPolicies
                - Provisioning
                - Deploying
                - Configuring
                - RollingOut
                - Running
                - Paused
                - RolledBack
                type: string
              sizeBytes:
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
