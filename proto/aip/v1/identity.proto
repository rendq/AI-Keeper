//
// Identity Broker + Token Exchanger gRPC contract.
// Implements design.md §4.2 / §10.2 and Requirement B3.
//
// Verifies inbound OIDC / SAML / SPIFFE credentials, performs RFC 8693
// On-Behalf-Of (OBO) token exchange, and revokes ServiceAccount tokens
// when a `core.ai-keeper.io/ServiceAccount` is deleted or disabled (B3.5).
syntax = "proto3";

package aip.v1;

import "google/protobuf/timestamp.proto";

// IdP source of the credential. Multiple IdPs can co-exist (B3.2).
enum IdentityProvider {
  IDENTITY_PROVIDER_UNSPECIFIED = 0;
  IDENTITY_PROVIDER_OIDC = 1;
  IDENTITY_PROVIDER_SAML = 2;
  IDENTITY_PROVIDER_SPIFFE = 3;
}

// Resolved subject after token verification.
message Subject {
  string tenant_id = 1;
  string user_id = 2;
  repeated string user_groups = 3;
  string service_account = 4;
  string spiffe_id = 5;
  string email = 6;
  // Free-form claims passed through from the IdP.
  map<string, string> claims = 7;
  google.protobuf.Timestamp expires_at = 8;
}

// Verify ---------------------------------------------------------------------

message VerifyRequest {
  // Raw bearer token (JWT for OIDC, SAML assertion for SAML, X.509 SVID DER
  // bytes encoded as base64 for SPIFFE).
  string token = 1;
  IdentityProvider provider = 2;
  // The audience the caller expects (e.g. `aip-gateway`).
  string audience = 3;
}

message VerifyResponse {
  bool valid = 1;
  Subject subject = 2;
  string failure_reason = 3;
}

// Exchange (RFC 8693) --------------------------------------------------------

message ExchangeRequest {
  // The original end-user token (subject_token in RFC 8693).
  string subject_token = 1;
  // `urn:ietf:params:oauth:token-type:jwt` etc.
  string subject_token_type = 2;
  // Target audience the caller wants to act against (e.g. `tool://docusign`).
  string audience = 3;
  // Tenant + agent context required for downstream audit traceability
  // (B3.6 — OBO tokens MUST embed tenantId / agentName / onBehalfOf).
  string tenant_id = 4;
  string agent_name = 5;
  // Requested scopes (subset of the configured allow-list).
  repeated string scopes = 6;
}

message ExchangeResponse {
  string access_token = 1;
  string issued_token_type = 2;
  google.protobuf.Timestamp expires_at = 3;
  repeated string scopes = 4;
}

// Revoke ---------------------------------------------------------------------

message RevokeRequest {
  // Either a ServiceAccount FQN (`<ns>/<name>`) or a specific access token.
  string service_account = 1;
  string access_token = 2;
  string reason = 3;
}

message RevokeResponse {
  // Number of active tokens invalidated.
  int32 revoked_count = 1;
  google.protobuf.Timestamp revoked_at = 2;
}

// Service --------------------------------------------------------------------

service IdentityService {
  // Verify an inbound OIDC / SAML / SPIFFE token (B3.2).
  rpc Verify(VerifyRequest) returns (VerifyResponse);

  // RFC 8693 OBO Token Exchange. Used when Agent.spec.identity.representation
  // .mode == "on_behalf_of" (B3.1, B3.3).
  rpc Exchange(ExchangeRequest) returns (ExchangeResponse);

  // Revoke all outstanding tokens for a ServiceAccount (B3.5: must complete
  // within 30 seconds of the SA being deleted/disabled).
  rpc Revoke(RevokeRequest) returns (RevokeResponse);
}
